function renderAllOverview(){
  const container=document.getElementById('alltrades-overview');
  if(!container)return;
  const wins=allTrades.filter(t=>t.result==='Win');
  const losses=allTrades.filter(t=>t.result==='Loss');
  const tot=allTrades.reduce((s,t)=>s+parseFloat(t.profit_loss||0),0);
  const gw=wins.reduce((s,t)=>s+parseFloat(t.profit_loss||0),0);
  const gl=Math.abs(losses.reduce((s,t)=>s+parseFloat(t.profit_loss||0),0));
  const wr=allTrades.length?(wins.length/allTrades.length*100):0;
  const pf=gl>0?(gw/gl):99;
  const aw=wins.length?gw/wins.length:0;
  const al=losses.length?gl/losses.length:0;
  const rrr=al>0?aw/al:0;
  const exp=allTrades.length?(tot/allTrades.length):0;
  const best=allTrades.length?Math.max(...allTrades.map(t=>parseFloat(t.profit_loss||0))):0;
  const worst=allTrades.length?Math.min(...allTrades.map(t=>parseFloat(t.profit_loss||0))):0;
  const fmtK=n=>{ const abs=Math.abs(n); const v=abs>=1000?(abs/1000).toFixed(1)+'K':abs.toFixed(0); return (n>=0?'+$':'-$')+v; };

  const firmTotals={};

  container.innerHTML=`

    <div class="kpi-card b"><div class="kpi-label">TOTAL TRADES</div><div class="kpi-value b">${allTrades.length}</div><div class="kpi-sub">${wins.length}W · ${losses.length}L</div></div>
    <div class="kpi-card ${wr>=40?'g':'r'}"><div class="kpi-label">WIN RATE</div><div class="kpi-value ${wr>=40?'g':'r'}">${wr.toFixed(1)}%</div><div class="kpi-sub">${wins.length} wins of ${allTrades.length}</div></div>
    <div class="kpi-card ${pf>=1.5?'g':'r'}"><div class="kpi-label">PROFIT FACTOR</div><div class="kpi-value ${pf>=1.5?'g':'r'}">${pf>=99?'∞':pf.toFixed(2)}</div><div class="kpi-sub">Target ≥ 1.5</div></div>
    <div class="kpi-card o"><div class="kpi-label">AVG RRR</div><div class="kpi-value o">${rrr.toFixed(2)}</div><div class="kpi-sub">Risk:Reward</div></div>
    <div class="kpi-card ${exp>=0?'g':'r'}"><div class="kpi-label">EXPECTANCY</div><div class="kpi-value ${exp>=0?'g':'r'}">${exp>=0?'+$':'-$'}${Math.abs(exp).toFixed(0)}</div><div class="kpi-sub">Per trade</div></div>
    <div class="kpi-card g"><div class="kpi-label">BEST TRADE</div><div class="kpi-value g">+$${best.toFixed(0)}</div><div class="kpi-sub">Largest win</div></div>
    <div class="kpi-card r"><div class="kpi-label">WORST TRADE</div><div class="kpi-value r">-$${Math.abs(worst).toFixed(0)}</div><div class="kpi-sub">Largest loss</div></div>
    ${firmCards}

    dayLabels.forEach(d=>{html+=`<div class="cal-day-label">${d}</div>`;});
    for(let i=0;i<first;i++) html+=`<div class="cal-day empty"></div>`;
    for(let d=1;d<=total;d++){
      const ds=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const day=dayMap[ds];
      if(!day){html+=`<div class="cal-day"><div class="cal-day-num">${d}</div></div>`;}

      }
    }
    html+=`</div></div>`;
  });
  container.innerHTML=html;

async function handleFirmCSVFiles(files,firm,firmName){
  if(!files||!files.length)return;
  if(!firmParsedTrades[firm])firmParsedTrades[firm]={};
  firmParsedTrades[firm].csv=[];
  const label   = document.getElementById(firm+'-csvPreviewLabel');
  const preview = document.getElementById(firm+'-csvPreview');
  const table   = document.getElementById(firm+'-csvPreviewTable');
  if(label)  label.textContent='Processing '+files.length+' file(s)...';
  if(preview)preview.style.display='block';
  if(table)  table.innerHTML='<div style="padding:10px;font-family:var(--font-mono);font-size:0.72rem;color:var(--muted);">Reading files...</div>';
  for(const file of Array.from(files)){
    const trades=await parseFirmCSVFile(file,firm);
    firmParsedTrades[firm].csv.push(...trades);
  }
  console.log('CSV parsed:',firmParsedTrades[firm].csv.length,'trades');
  if(firmParsedTrades[firm].csv.length){
    showFirmTradePreview(firm+'-csvPreviewTable',firm+'-csvPreviewLabel',firmParsedTrades[firm].csv);
    if(preview)preview.style.display='block';
  } else {
    if(label)label.textContent='No trades found. Check file format (CSV with headers: date,instrument,direction,entry,exit,pnl).';
  }
}

async function parseFirmCSVFile(file,firm){
  const name=file.name.toLowerCase();

  // ── HTML / HTM — MT5 trade history export ──
  if(name.endsWith('.html')||name.endsWith('.htm')){
    try{
      const arrayBuf=await file.arrayBuffer();
      const bytes=new Uint8Array(arrayBuf);
      let htmlText='';
      if((bytes[0]===0xFF&&bytes[1]===0xFE)||(bytes[0]===0xFE&&bytes[1]===0xFF)){
        htmlText=new TextDecoder('utf-16').decode(arrayBuf);
      } else {
        htmlText=new TextDecoder('utf-8').decode(arrayBuf);
      }
      htmlText=htmlText.replace(/␀/g,'');
      const trades=parseMT5Html(htmlText);
      if(!trades.length)showToast('No trades found in HTML. Must be MT5 Trade History report.',true);
      return trades.map(t=>({...t,user_id:currentUser?.id}));
    }catch(e){showToast('Could not read HTML file: '+e.message,true);return[];}
  }

  // ── XML — MT4/MT5/cTrader XML exports ──
  if(name.endsWith('.xml')){
    try{
      const text=await file.text();
      const parser=new DOMParser();
      const doc=parser.parseFromString(text,'application/xml');
      const trades=[];
      // Try MT4/MT5 XML structure: <TradeRecord> or <Deal> or <Order> elements
      const rows=[...doc.querySelectorAll('TradeRecord,Deal,Order,Row,trade,Trade')];
      rows.forEach(row=>{
        const get=(tags)=>{ for(const t of tags.split(',')){ const el=row.querySelector(t)||row.getAttribute(t.trim()); if(el) return (el.textContent||el).trim(); } return ''; };
        const dateRaw=get('OpenTime,CloseTime,Date,date,Time,open_time');
        const date=dateRaw?dateRaw.slice(0,10).replace(/[./]/g,'-'):'';
        const inst=get('Symbol,symbol,Instrument,instrument,Asset');
        const dir=get('Type,Direction,direction,Side,type');
        const entry=parseFloat(get('OpenPrice,open_price,EntryPrice,entry,Open')||0);
        const exit_=parseFloat(get('ClosePrice,close_price,ExitPrice,exit,Close')||0);
        const pnl=parseFloat(get('Profit,profit,PnL,pnl,NetProfit,net_profit')||0);
        if(!inst||!date)return;
        trades.push({
          date,instrument:inst,
          direction:dir.toLowerCase().includes('sell')?'Sell':'Buy',
          entry_price:entry,exit_price:exit_,profit_loss:pnl,
          result:pnl>0?'Win':pnl<0?'Loss':'Break Even',
          user_id:currentUser?.id
        });
      });
      // Also try simple attribute-based XML <trade date="..." symbol="..." profit="..." />
      if(!trades.length){
        const attrRows=[...doc.querySelectorAll('[profit],[Profit],[pnl]')];
        attrRows.forEach(row=>{
          const attrs=row.attributes;
          const getA=(names)=>{ for(const n of names.split(',')){ const v=row.getAttribute(n.trim()); if(v)return v.trim(); } return ''; };
          const pnl=parseFloat(getA('profit,Profit,pnl,net_profit')||0);
          const date=(getA('date,Date,opentime,close_time')||'').slice(0,10).replace(/[./]/g,'-');
          const inst=getA('symbol,Symbol,instrument,asset');
          if(!inst)return;
          trades.push({date,instrument:inst,direction:getA('type,direction,side').toLowerCase().includes('sell')?'Sell':'Buy',entry_price:parseFloat(getA('open,entry,openprice')||0),exit_price:parseFloat(getA('close,exit,closeprice')||0),profit_loss:pnl,result:pnl>0?'Win':pnl<0?'Loss':'Break Even',user_id:currentUser?.id});
        });
      }
      showToast(trades.length?`Found ${trades.length} trades in XML`:'No trades found in XML — check format.',!trades.length);
      return trades;
    }catch(e){showToast('Could not parse XML: '+e.message,true);return[];}
  }

  // ── PDF — extract text and parse trade rows ──
  if(name.endsWith('.pdf')){
    try{
      showToast('Reading PDF...');
      const arrayBuf=await file.arrayBuffer();
      // Use PDF.js if available, otherwise use text extraction fallback
      if(typeof pdfjsLib!=='undefined'){
        const pdf=await pdfjsLib.getDocument({data:arrayBuf}).promise;
        let fullText='';
        for(let p=1;p<=pdf.numPages;p++){
          const page=await pdf.getPage(p);
          const content=await page.getTextContent();
          fullText+=content.items.map(i=>i.str).join(' ')+'\n';
        }
        const trades=parseTextTrades(fullText);
        showToast(trades.length?`Found ${trades.length} trades in PDF`:'No trades detected in PDF — try CSV export instead.',!trades.length);
        return trades.map(t=>({...t,user_id:currentUser?.id}));
      } else {
        // Fallback: try reading as text (some PDFs are text-based)
        const text=await file.text().catch(()=>'');
        if(text){
          const trades=parseTextTrades(text);
          if(trades.length){showToast(`Found ${trades.length} trades in PDF`);return trades.map(t=>({...t,user_id:currentUser?.id}));}
        }
        showToast('PDF reading requires PDF.js. Try exporting as CSV or HTML instead.',true);
        return [];
      }
    }catch(e){showToast('Could not read PDF: '+e.message+'. Try CSV/HTML instead.',true);return[];}
  }

  // ── CSV / TXT — native parsing ──
  const text=await file.text();
  const trades=parseCSVText(text);
  if(!trades.length) showToast('No trades found. Expected columns: Date, Instrument, Direction, Entry, Exit, P&L',true);
  return trades;
}

function parseCSVText(text){
  // Smart CSV parser — auto-detects column order from headers
  const lines=text.split('\n').map(l=>l.replace(/\r/g,'')).filter(l=>l.trim());
  if(!lines.length)return[];
  const trades=[];
  let headerIdx=0;
  let headers=[];
  for(let i=0;i<Math.min(5,lines.length);i++){
    const row=lines[i].split(',').map(s=>s.trim().replace(/"/g,'').toLowerCase());
    if(row.some(h=>['date','time','symbol','instrument','profit','pnl'].includes(h))){
      headers=row; headerIdx=i; break;
    }
  }
  const col=(names)=>{ for(const n of names){ const i=headers.indexOf(n); if(i>=0)return i; } return -1; };
  const iDate =col(['date','open time','opentime','time','close time']);
  const iInst =col(['symbol','instrument','asset','market']);
  const iDir  =col(['type','direction','side','action']);
  const iEntry=col(['open','entry','open price','openprice','price']);
  const iExit =col(['close','exit','close price','closeprice']);
  const iPnl  =col(['profit','p&l','pnl','net profit','netprofit','result']);
  for(let i=headerIdx+1;i<lines.length;i++){
    const cols=lines[i].split(',').map(s=>s.trim().replace(/"/g,''));
    if(cols.length<3)continue;
    const rawDate=iDate>=0?cols[iDate]:cols[0];
    const inst   =iInst>=0?cols[iInst]:cols[1];
    const dirRaw =iDir>=0?cols[iDir]:cols[2];
    const entry  =parseFloat(iEntry>=0?cols[iEntry]:cols[3])||0;
    const exit_  =parseFloat(iExit>=0?cols[iExit]:cols[4])||0;
    const pnlRaw =parseFloat(iPnl>=0?cols[iPnl]:(cols[5]||cols[4]))||0;
    if(!inst||inst==='Unknown'||!inst.trim())continue;
    const date=rawDate?rawDate.slice(0,10).replace(/[./]/g,'-'):'';
    const dir=dirRaw.toLowerCase().includes('sell')?'Sell':'Buy';
    trades.push({date,instrument:inst,direction:dir,entry_price:entry,exit_price:exit_,profit_loss:pnlRaw,result:pnlRaw>0?'Win':pnlRaw<0?'Loss':'Break Even',user_id:currentUser?.id});
  }
  return trades;
}
function parseTextTrades(text){
  // Extract trades from plain text (PDF text, paste data)
  // Look for lines with date pa
function parseTextTrades(text){
  // Extract trades from plain text (PDF, paste)
  const trades=[];
  const lines=text.split('\n');
  const dateRe=/\b(\d{4}[.\/-]\d{2}[.\/-]\d{2}|\d{2}[.\/-]\d{2}[.\/-]\d{4})\b/;
  const numRe=/[-+]?\d+\.\d{2,}/g;
  lines.forEach(function(line){
    const dateM=line.match(dateRe);
    if(!dateM)return;
    const nums=(line.match(numRe)||[]).map(Number).filter(function(n){return Math.abs(n)<1000000;});
    if(!nums.length)return;
    const pnl=nums[nums.length-1];
    const words=line.replace(/[0-9.\-+,]/g,' ').split(/\s+/).filter(function(w){return w.length>2&&w.length<12&&/^[A-Za-z]/.test(w);});
    const inst=words.find(function(w){return /^[A-Z]{3,8}$/.test(w.toUpperCase());})||'Unknown';
    const dir=line.toLowerCase().includes('sell')?'Sell':'Buy';
    const date=dateM[0].slice(0,10).replace(/[./]/g,'-');
    trades.push({date:date,instrument:inst,direction:dir,entry_price:nums[0]||0,exit_price:nums[1]||0,profit_loss:pnl,result:pnl>0?'Win':pnl<0?'Loss':'Break Even'});
  });
  return trades;
}
}

async function handleFirmImgFiles(files, firm, firmName){
  if(!files||!files.length) return;
  if(!firmParsedTrades[firm]) firmParsedTrades[firm]={};
  firmParsedTrades[firm].img=[];
  const fileArr = Array.from(files);

  // Only accept jpg, png, tiff, heic
  const valid = fileArr.filter(f=>{
    const ext = f.name.toLowerCase().split('.').pop();
    return ['jpg','jpeg','png','tiff','tif','heic','heif'].includes(ext);
  });
  if(!valid.length){ showToast('Only JPG, PNG, TIFF, HEIC files are supported.',true); return; }

  const progressArea  = document.getElementById(firm+'-imgProgressArea');
  const progressLabel = document.getElementById(firm+'-imgProgressLabel');
  const progressCount = document.getElementById(firm+'-imgProgressCount');
  const progressBar   = document.getElementById(firm+'-imgProgressBar');
  const fileStatuses  = document.getElementById(firm+'-imgFileStatuses');
  const imgPreview    = document.getElementById(firm+'-imgPreview');

  if(!progressArea){ showToast('Open Upload tab first',true); return; }
  progressArea.style.display='block';
  if(imgPreview) imgPreview.style.display='none';
  progressLabel.textContent='Processing '+valid.length+' image'+(valid.length>1?'s':'')+'...';
  progressCount.textContent='0/'+valid.length;
  progressBar.style.width='0%';
  fileStatuses.innerHTML='';

  valid.forEach((file,i)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:0.68rem;padding:4px 6px;background:var(--surface2);border-radius:3px;';
    row.innerHTML=`<span id="${firm}-ficon_${i}" style="color:var(--muted);">[ ]</span>`
      +`<span style="flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${file.name}</span>`
      +`<span id="${firm}-ftrades_${i}" style="color:var(--muted);">waiting</span>`;
    fileStatuses.appendChild(row);
  });

  let completed=0;

  const results = await Promise.allSettled(valid.map(async(file,i)=>{
    const iconEl  = document.getElementById(firm+'-ficon_'+i);
    const tradeEl = document.getElementById(firm+'-ftrades_'+i);
    if(iconEl)  iconEl.textContent='[~]';
    if(tradeEl) tradeEl.textContent='reading...';
    try{
      // Convert image to base64
      const {base64, mimeType} = await fileToBase64Safe(file);
      if(tradeEl) tradeEl.textContent='analysing...';

      // Call Anthropic API directly with native image support
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key': getAnthropicKey(),
          'anthropic-version':'2023-06-01'
        },
        body:JSON.stringify({
          model:'claude-opus-4-6',
          max_tokens:2000,
          messages:[{
            role:'user',
            content:[
              {
                type:'image',
                source:{type:'base64', media_type:mimeType, data:base64}
              },
              {
                type:'text',
                text:'Extract ALL trade rows from this trading platform screenshot. Return ONLY a raw JSON array with no markdown or explanation. Each object: date (YYYY-MM-DD), instrument (symbol string), direction ("Buy" or "Sell"), entry_price (number), exit_price (number), profit_loss (number, negative for losses), result ("Win", "Loss", or "Break Even"). Use 0 for missing numbers, "Unknown" for missing strings.'
              }
            ]
          }]
        })
      });

      if(!resp.ok){
        const err = await resp.json().catch(()=>({error:{message:'HTTP '+resp.status}}));
        throw new Error(err.error?.message||'HTTP '+resp.status);
      }

      const data  = await resp.json();
      const text  = data.content?.[0]?.text||'';
      if(!text.trim()) throw new Error('Empty response from Claude');

      const clean = text.replace(/```json|```/g,'').trim();
      const match = clean.match(/\[[\s\S]*\]/);
      if(!match) throw new Error('No JSON array in response');

      const parsed = JSON.parse(match[0]);
      if(!Array.isArray(parsed)||!parsed.length) throw new Error('No trades found in image');

      if(iconEl){ iconEl.style.color='var(--green)'; iconEl.textContent='[OK]'; }
      if(tradeEl){ tradeEl.style.color='var(--green)'; tradeEl.textContent=parsed.length+' trade'+(parsed.length>1?'s':''); }
      completed++;
      progressBar.style.width=Math.round(completed/valid.length*100)+'%';
      progressCount.textContent=completed+'/'+valid.length;
      return parsed.map(t=>({...t,user_id:currentUser?.id}));

    }catch(e){
      if(iconEl){ iconEl.style.color='var(--red)'; iconEl.textContent='[X]'; }
      if(tradeEl){ tradeEl.style.color='var(--red)'; tradeEl.textContent=e.message.slice(0,40); }
      completed++;
      progressBar.style.width=Math.round(completed/valid.length*100)+'%';
      progressCount.textContent=completed+'/'+valid.length;
      console.error('Image parse error:',file.name,e);
      return [];
    }
  }));

  results.forEach(r=>{ if(r.status==='fulfilled') firmParsedTrades[firm].img.push(...r.value); });

  if(firmParsedTrades[firm].img.length){
    progressLabel.style.color='var(--green)';
    progressLabel.textContent='Found '+firmParsedTrades[firm].img.length+' trades from '+valid.length+' image'+(valid.length>1?'s':'')+'!';
    showFirmTradePreview(firm+'-imgPreviewTable', firm+'-imgPreviewLabel', firmParsedTrades[firm].img);
    if(imgPreview) imgPreview.style.display='block';
  } else {
    progressLabel.style.color='var(--yellow)';
    progressLabel.textContent='No trades found. Ensure screenshots show trade history rows.';
  }
}


async function saveFirmTrades(firm,firmName,type){
  const trades=(firmParsedTrades[firm]||{})[type]||[];
  if(!trades.length){showToast('No trades to save',true);return;}
  if(!currentUser){showToast('Please sign in first',true);return;}

  showToast('Saving '+trades.length+' trades...');

  // Fetch existing to deduplicate
  const{data:existing,error:fetchErr}=await sb.from('trades')
    .select('date,instrument,direction,profit_loss')
    .eq('user_id',currentUser.id);

  if(fetchErr){
    console.error('Fetch error:',fetchErr);
    showToast('DB error: '+fetchErr.message,true);
    return;
  }

  const existingKeys=new Set((existing||[]).map(t=>tradeKey(t)));
  const newTrades=trades.filter(t=>!existingKeys.has(tradeKey(t)));
  const dupeCount=trades.length-newTrades.length;

  console.log('saveFirmTrades:',{total:trades.length,existing:existingKeys.size,new:newTrades.length,dupes:dupeCount});
  console.log('Sample new key:', newTrades.length?tradeKey(newTrades[0]):'none');
  console.log('Sample existing keys:', [...existingKeys].slice(0,3));

  if(!newTrades.length){
    showToast('✅ All '+trades.length+' trades already saved — go to Trade History to view them.');
    setTimeout(()=>{
      const histTab=document.querySelector('#subNav .sub-tab:nth-child(3)');
      if(histTab)switchSubTab(histTab,'history');
    },1800);
    return;
  }

  // Clean batch — only send columns that exist in DB
  const batch=newTrades.map(t=>({
    user_id:     currentUser.id,
    account_provider: firmName,
    date:        String(t.date||'').trim(),
    instrument:  String(t.instrument||'Unknown').trim(),
    direction:   String(t.direction||'—').trim(),
    entry_price: parseFloat(t.entry_price)||0,
    exit_price:  parseFloat(t.exit_price)||0,
    profit_loss: parseFloat(t.profit_loss)||0,
    result:      String(t.result||'').trim()||((parseFloat(t.profit_loss)||0)>0?'Win':(parseFloat(t.profit_loss)||0)<0?'Loss':'Break Even'),
  }));

  let saved=0;
  const errs=[];
  for(let i=0;i<batch.length;i+=50){
    const chunk=batch.slice(i,i+50);
    const{error}=await sb.from('trades').insert(chunk);
    if(!error) saved+=chunk.length;
    else { console.error('Insert error:',error); errs.push(error.message); }
  }

  if(errs.length) showToast('Partial save — errors: '+errs[0],true);
  else {
    let msg='Saved '+saved+' trades to '+firmName+'!';
    if(dupeCount>0) msg+=' ('+dupeCount+' duplicates skipped)';
    showToast(msg);
  }

  // Hide preview
  const previewEl=document.getElementById(firm+'-'+type+'Preview');
  if(previewEl) previewEl.style.display='none';

  await loadTradesFromSupabase();
  renderSubPage(firm,activeSubTab);
}

function drawCurveOnCanvas(canvas,pts){
  const W=canvas.offsetWidth||600,H=canvas.offsetHeight||190;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(pts.length<2)return;
  const min=Math.min(...pts),max=Math.max(...pts);
  const range=max-min||1;
  const pad=20;
  const toX=i=>(i/(pts.length-1))*(W-pad*2)+pad;
  const toY=v=>H-pad-(v-min)/range*(H-pad*2);
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.shadowColor='rgba(0,212,255,0.4)';ctx.shadowBlur=8;
  ctx.beginPath();pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));ctx.stroke();
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(0,212,255,0.15)');grad.addColorStop(1,'rgba(0,212,255,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(toX(0),toY(pts[0]));pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));ctx.lineTo(toX(pts.length-1),H);ctx.lineTo(toX(0),H);ctx.closePath();ctx.fill();
}

function parseMT5Html(html){
    const trades = [];
    const rowMatches = html.match(/<tr[^>]*>[\s\S]*?<\/tr>/gi)||[];

    function clean(s){ return s.replace(/<[^>]+>/g,'').replace(/\u00a0/g,' ').replace(/\u202f/g,' ').trim(); }
    function cleanNum(s){ const n=parseFloat((s||'').replace(/[\s,]/g,'')); return isNaN(n)?0:n; }

    const format_a = []; // 14-col: completed trades
    const format_b = []; // 15-col: position legs (FTMO style)

    rowMatches.forEach(row=>{
      const rawCells = row.match(/<t[dh][^>]*>([\s\S]*?)<\/t[dh]>/gi)||[];
      const cells = rawCells.map(c=>clean(c));
      const n = cells.length;
      if(!cells[0]||!/^\d{4}\.\d{2}\.\d{2}/.test(cells[0])) return;

      // FORMAT A: 14 columns — standard MT5 closed trade
      if(n===14){
        const dir=cells[3].toLowerCase().trim();
        if(dir!=='buy'&&dir!=='sell') return;
        const entry=cleanNum(cells[6]);
        if(!entry) return;
        if(!/^\d{4}\.\d{2}\.\d{2}/.test(cells[9])) return;
        const pnl=cleanNum(cells[13]);
        format_a.push({
          date:cells[0].slice(0,10).replace(/\./g,'-'),
          instrument:cells[2]||'Unknown',
          direction:dir.charAt(0).toUpperCase()+dir.slice(1),
          entry_price:entry,
          exit_price:cleanNum(cells[10]),
          profit_loss:pnl,
          result:pnl>0?'Win':pnl<0?'Loss':'Break Even'
        });
      }

      // FORMAT B: 15 columns — FTMO/position deals, only 'out' (closing) legs
      else if(n===15&&cells[4]==='out'&&cells[2]){
        const dir=cells[3].toLowerCase().trim();
        if(dir!=='buy'&&dir!=='sell') return;
        const pnl=cleanNum(cells[12]);
        const price=cleanNum(cells[6]);
        // Reverse direction: closing sell = original buy trade
        const origDir=dir==='sell'?'Buy':'Sell';
        format_b.push({
          date:cells[0].slice(0,10).replace(/\./g,'-'),
          instrument:cells[2]||'Unknown',
          direction:origDir,
          entry_price:price,
          exit_price:price,
          profit_loss:pnl,
          result:pnl>0?'Win':pnl<0?'Loss':'Break Even'
        });
      }
    });

    // Prefer Format A (complete trade records) if it has data
    // Fall back to Format B (FTMO position legs) if Format A is empty
    const result = format_a.length > 0 ? format_a : format_b;
    return result;
  }


async function handleCSVFiles(files){

    showTradePreview('csvPreview','csvPreviewLabel','csvPreviewTable',csvParsedTrades);
  } else {
    document.getElementById('csvPreviewLabel').textContent='No trades found in uploaded files.';
  }
}

async function handleCSVFile(file){
  if(!file)return;
  const text=await file.text();
  const name=file.name.toLowerCase();

  // HTML/HTM — handle MT5 UTF-16 export format
  if(name.endsWith('.html')||name.endsWith('.htm')){
    showToast('Reading MT5 HTML file...');
    try{
      const arrayBuf = await file.arrayBuffer();
      const bytes = new Uint8Array(arrayBuf);
      // Detect UTF-16 BOM (FF FE or FE FF)
      let htmlText = '';
      if((bytes[0]===0xFF&&bytes[1]===0xFE)||(bytes[0]===0xFE&&bytes[1]===0xFF)){
        htmlText = new TextDecoder('utf-16').decode(arrayBuf);
      } else {
        htmlText = new TextDecoder('utf-8').decode(arrayBuf);
      }
      // Remove null chars
      htmlText = htmlText.replace(/␀/g,'');

      const trades = parseMT5Html(htmlText);

      if(trades.length){
        _csvFirm = autoDetectFirm(htmlText) || 'Other';
        showDetectedFirm('csvDetectedFirm', _csvFirm==='Other'?null:_csvFirm);
        csvParsedTrades.push(...trades.map(t=>({...t,user_id:currentUser?.id})));
        showTradePreview('csvPreview','csvPreviewLabel','csvPreviewTable',csvParsedTrades);
        showToast('Found '+trades.length+' trades → '+_csvFirm);
      } else {
        showToast('No trades found. Make sure this is a MT5 Trade History Report.',true);
      }
    }catch(e){
      console.warn('HTML parse error:',e);
      showToast('Could not read HTML. Please export from MT5 as HTML and try again.',true);
    }
    return;
  }



  // CSV — parse directly
  const lines=text.split('\n').filter(l=>l.trim());
  const trades=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(',').map(c=>c.trim().replace(/"/g,''));
    if(cols.length<3)continue;
    const pnl=parseFloat(cols[5]||cols[4]||0);
    trades.push({
      date:cols[0]||new Date().toISOString().split('T')[0],
      instrument:cols[1]||'Unknown',
      direction:cols[2]||'—',
      entry_price:parseFloat(cols[3])||0,
      exit_price:parseFloat(cols[4])||0,
      profit_loss:pnl,
      result:pnl>0?'Win':pnl<0?'Loss':'Break Even',
      user_id:currentUser?.id
    });
  }
  // Auto-detect from instrument names in CSV
  const instText = trades.map(t=>t.instrument||'').join(' ');
  _csvFirm = autoDetectFirm(instText) || 'Other';
  showDetectedFirm('csvDetectedFirm', _csvFirm==='Other'?null:_csvFirm);
  csvParsedTrades.push(...trades);
}

async function handleImgFiles(files){
  if(!files||!files.length)return;
  imgParsedTrades=[];
  const fileArr=Array.from(files);
  const total=fileArr.length;
  const progressArea=document.getElementById('imgProgressArea');
  const progressLabel=document.getElementById('imgProgressLabel');
  const progressCount=document.getElementById('imgProgressCount');
  const progressBar=document.getElementById('imgProgressBar');
  const fileStatuses=document.getElementById('imgFileStatuses');
  const imgPreview=document.getElementById('imgPreview');
  if(progressArea)progressArea.style.display='block';
  if(imgPreview)imgPreview.style.display='none';
  if(progressLabel){progressLabel.style.color='var(--accent)';progressLabel.textContent='Processing '+total+' screenshot'+(total>1?'s':'')+'...';}
  if(progressCount)progressCount.textContent='0/'+total;
  if(progressBar)progressBar.style.width='0%';
  if(fileStatuses)fileStatuses.innerHTML='';
  fileArr.forEach((file,i)=>{
    const row=document.createElement('div');
    row.id='fstatus_'+i;
    row.style.cssText='display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:0.68rem;padding:5px 8px;background:var(--surface2);border-radius:3px;';
    const fname=file.name||('Screenshot '+(i+1));
    row.innerHTML='<span id="ficon_'+i+'" style="color:var(--muted);">[ ]</span>'
      +'<span style="color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+fname+'</span>'
      +'<span id="ftrades_'+i+'" style="color:var(--muted);">waiting</span>';
    fileStatuses.appendChild(row);
  });
  let completed=0;
  function updateProgress(){
    completed++;
    const pct=Math.round(completed/total*100);
    if(progressBar)progressBar.style.width=pct+'%';
    if(progressCount)progressCount.textContent=completed+'/'+total;
    if(completed===total&&progressLabel)progressLabel.textContent='Done! Processed '+total+' file'+(total>1?'s':'');
  }
  const results=await Promise.allSettled(fileArr.map(async(file,i)=>{
    document.getElementById('ficon_'+i).textContent='[~]';
    document.getElementById('ftrades_'+i).textContent='reading...';
    try{
      const {base64,mimeType}=await fileToBase64Safe(file);
      
      // Show size info for debugging
      const sizeKB = Math.round(base64.length * 0.75 / 1024);
      document.getElementById('ftrades_'+i).textContent='sending '+sizeKB+'KB...';
      
      const resp=await fetch('https://empty-tree-0b19.nwaogalanyapaulinus.workers.dev',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image:base64,mimeType:mimeType,prompt:'You are a trading journal assistant. This screenshot shows trade history from MT5, Deriv, FTMO, The5ers, or similar. Extract ALL visible trades and return ONLY a JSON array, no explanation, no markdown. Each object: date (YYYY-MM-DD), instrument (string), direction (Buy or Sell), entry_price (number), exit_price (number), profit_loss (number, negative for losses), result (Win/Loss/Break Even). Use 0 for missing numbers, Unknown for missing strings. Return [] ONLY if truly no trade rows exist.'})
      });
      
      if(!resp.ok) throw new Error('Worker returned HTTP '+resp.status);
      
      const data=await resp.json();
      console.log('Worker response:', JSON.stringify(data).slice(0,300));
      
      if(data.error) throw new Error(JSON.stringify(data.error));
      
      const text=data.response||data.content?.[0]?.text||'';
      console.log('Raw AI response:', text.slice(0,500));
      
      if(!text||text.trim()==='') throw new Error('Empty response from worker');
      
      const clean=text.replace(/```json|```/g,'').trim();
      const jsonMatch=clean.match(/\[[\s\S]*\]/);
      if(!jsonMatch) throw new Error('No JSON found in: '+clean.slice(0,100));
      
      const parsed=JSON.parse(jsonMatch[0]);
      if(!Array.isArray(parsed)||!parsed.length) throw new Error('Empty trade array');
      
      document.getElementById('ficon_'+i).style.color='var(--green)';
      document.getElementById('ficon_'+i).textContent='[OK]';
      document.getElementById('ftrades_'+i).style.color='var(--green)';
      document.getElementById('ftrades_'+i).textContent=parsed.length+' trade'+(parsed.length>1?'s':'');
      updateProgress();
      return parsed.map(t=>({...t,user_id:currentUser?.id}));
    }catch(e){
      document.getElementById('ficon_'+i).style.color='var(--red)';
      document.getElementById('ficon_'+i).textContent='[X]';
      document.getElementById('ftrades_'+i).style.color='var(--red)';
      document.getElementById('ftrades_'+i).textContent=e.message.slice(0,40);
      updateProgress();
      console.error('Image parse error for',file.name,':',e.message);
      return [];
    }
  }));
  results.forEach(r=>{ if(r.status==='fulfilled') imgParsedTrades.push(...r.value); });
  // Detect firm from extracted instruments + filenames
  const imgInstText = imgParsedTrades.map(t=>t.instrument||'').join(' ');
  const imgFileNames = fileArr.map(f=>f.name||'').join(' ');
  _imgFirm = autoDetectFirm(imgInstText+' '+imgFileNames) || 'Other';
  showDetectedFirm('imgDetectedFirm', _imgFirm==='Other'?null:_imgFirm);
  if(imgParsedTrades.length){
    progressLabel.textContent='Found '+imgParsedTrades.length+' trades across '+total+' file'+(total>1?'s':'')+'!';
    progressLabel.style.color='var(--green)';
    $set('imgPreviewLabel','textContent','Preview — '+imgParsedTrades.length+' trades found:');
    showTradePreview('imgPreview',null,'imgPreviewTable',imgParsedTrades);
    if(imgPreview)imgPreview.style.display='block';
  } else {
    progressLabel.textContent='No trades found. Make sure screenshots show trade history rows.';
    progressLabel.style.color='var(--yellow)';
  }
}
// Safe base64 converter — resizes and normalises phone images
async function fileToBase64Safe(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>{
        // Fallback: just return raw base64
        resolve({base64:reader.result.split(',')[1],mimeType:'image/jpeg'});
      };
      img.onload=()=>{
        // Resize to max 1600px wide for best AI reading while keeping file small
        const MAX=1600;
        let w=img.width,h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.92);
        resolve({base64:dataUrl.split(',')[1],mimeType:'image/jpeg'});
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}

// ── AUTO-DETECT FIRM FROM FILE CONTENT ──
function autoDetectFirm(text){
  const t = text.toLowerCase();
  if(t.includes('fivepercent')||t.includes('five percent')||t.includes('5percent')||t.includes('the5ers')||t.includes('5%ers')) return 'The5ers';
  if(t.includes('ftmo')) return 'FTMO';
  if(t.includes('myforexfunds')||t.includes('mff')) return 'Other';
  if(t.includes('deriv')||t.includes('volatility')||t.includes('binary')) return 'Deriv';
  if(t.includes('fundedtrader')||t.includes('funded trader')) return 'Other';
  if(t.includes('topstep')||t.includes('apex')||t.includes('trueforex')) return 'Other';
  return null; // could not detect
}

// ── GENERATE DUPLICATE KEY ──
function tradeKey(t){
  // Use date + instrument + direction + pnl rounded to 0dp
  // Avoids float precision mismatches between parsed CSV and DB storage
  const pnl = Math.round(parseFloat(String(t.profit_loss||0))||0);
  const dir  = String(t.direction||'').trim().toLowerCase().slice(0,4);
  const inst = String(t.instrument||'').trim().toLowerCase().replace(/\s+/g,'');
  const date = String(t.date||'').trim().slice(0,10);
  return date+'|'+inst+'|'+dir+'|'+pnl;
}

function detectOrGetProvider(dropdownId, trades){
  // Scan instrument names + any firm field on the trade objects
  const combined = trades.map(t=>[(t.instrument||''),(t.account_provider||''),(t.firm||'')].join(' ')).join(' ').toLowerCase();
  const detected = autoDetectFirm(combined);
  if(detected) return detected;
  // Fall back to dropdown selection
  return document.getElementById(dropdownId)?.value || 'Other';
}

async function saveUploadedTrades(trades, containerId, provider){
  if(!trades.length){showToast('No trades to save',true);return;}
  if(!currentUser){showToast('Please sign in first',true);return;}

  // Get existing trades to prevent duplicates
  const{data:existing}=await sb.from('trades').select('date,instrument,direction,profit_loss').eq('user_id',currentUser.id);
  const existingKeys=new Set((existing||[]).map(t=>tradeKey(t)));

  // Filter out duplicates
  const newTrades=trades.filter(t=>!existingKeys.has(tradeKey(t)));
  const dupeCount=trades.length-newTrades.length;

  if(!newTrades.length){
    showToast('All '+trades.length+' trades already exist — no duplicates saved.',true);
    document.getElementById(containerId).style.display='none';
    return;
  }

  // Batch insert
  const batch=newTrades.map(t=>({
    ...t,
    user_id:currentUser.id,
    account_provider:provider
  }));

  let saved=0;
  const chunkSize=50;
  for(let i=0;i<batch.length;i+=chunkSize){
    const chunk=batch.slice(i,i+chunkSize);
    const{error}=await sb.from('trades').insert(chunk);
    if(!error) saved+=chunk.length;
    else console.warn('Insert error:',error.message);
  }

  let msg='Saved '+saved+' trades to '+provider+'!';
  if(dupeCount>0) msg+=' ('+dupeCount+' duplicates skipped)';
  showToast(msg);
  document.getElementById(containerId).style.display='none';
  await loadTradesFromSupabase();

  // Auto-navigate to firm history tab after save
  // (handled by renderSubPage refresh in loadTradesFromSupabase)
}

// ── PAGE ZOOM — scales entire app inward with black surround ──
const PAGE_ZOOM_STEP = 0.05;
const PAGE_ZOOM_MIN  = 0.5;
const PAGE_ZOOM_MAX  = 1.0;

function pageZoom(dir){
  const current = parseFloat(localStorage.getItem('pageZoomScale')||'1.0');
  const next = parseFloat(Math.max(PAGE_ZOOM_MIN, Math.min(PAGE_ZOOM_MAX, current + dir * PAGE_ZOOM_STEP)).toFixed(2));
  localStorage.setItem('pageZoomScale', next);
  applyPageZoom(next);
}

function applyPageZoom(scale){
  const el = document.getElementById('appScreen');
  if(!el) return;
  el.style.transformOrigin = 'center top';
  el.style.transform = scale < 1.0 ? 'scale('+scale+')' : 'scale(1)';
  // Black background on body so surroundings are dark
  document.body.style.background = '#000';
  const lbl = document.getElementById('pageZoomPct');
  if(lbl) lbl.textContent = Math.round(scale*100)+'%';
}

// Restore on load
document.addEventListener('DOMContentLoaded', ()=>{
  const saved = parseFloat(localStorage.getItem('pageZoomScale')||'1.0');
  applyPageZoom(saved);
});
