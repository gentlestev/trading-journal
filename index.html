<!DOCTYPE html>
<html>
<head>
<title>MFX Proxy Test</title>

<style>
body{
font-family:monospace;
background:#07090d;
color:#00e5b0;
padding:40px;
}

button{
background:#00e5b0;
border:none;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

input{
padding:8px;
margin:5px 0;
width:260px;
}

#result{
margin-top:20px;
white-space:pre-wrap;
background:#111;
padding:15px;
border-radius:6px;
}
</style>

</head>

<body>

<h2>🔄 Myfxbook API Proxy</h2>
<p>Test your Netlify proxy connection.</p>

<div>
<label>Email</label><br>
<input id="email" placeholder="Myfxbook email">
</div>

<div>
<label>Password</label><br>
<input id="pass" type="password" placeholder="Myfxbook password">
</div>

<button onclick="login()">Test Login</button>

<div id="result">Waiting...</div>

<script>

async function login(){

const email=document.getElementById("email").value
const pass=document.getElementById("pass").value

const url=`/.netlify/functions/mfxapi?action=loginandaccounts&email=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`

document.getElementById("result").innerText="Connecting..."

try{

const res=await fetch(url)
const data=await res.json()

document.getElementById("result").innerText=
JSON.stringify(data,null,2)

}catch(e){

document.getElementById("result").innerText="Error: "+e

}

}

</script>

</body>
</html>
